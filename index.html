<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Map Memo</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header>
      <h1>🗺️ Map Memo</h1>
      <p>地図をクリックしてメモを追加できます。</p>
    </header>

    <main>
      <section id="map"></section>

      <section class="panel">
        <h2>メモ一覧</h2>
        <ul id="memo-list"></ul>
      </section>
    </main>

    <dialog id="memo-dialog">
      <form id="memo-form" method="dialog">
        <h3>メモを作成</h3>
        <p id="selected-position"></p>
        <label for="memo-text">内容</label>
        <textarea id="memo-text" rows="4" maxlength="200" required></textarea>

        <div class="actions">
          <button value="cancel" type="button" id="cancel-btn">キャンセル</button>
          <button value="default" type="submit">保存</button>
        </div>
      </form>
    </dialog>

    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script src="app.js"></script>
  </body>
</html>
